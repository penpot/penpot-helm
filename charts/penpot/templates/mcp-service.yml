{{- if eq (include "penpot.mcpEnabled" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "penpot.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "penpot.labels" . | nindent 4 }}
  {{- if .Values.mcp.service.annotations }}
  annotations:
    {{- .Values.mcp.service.annotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.httpPort }}
      targetPort: {{ .Values.mcp.service.httpPort }}
      protocol: TCP
      name: http
    - port: {{ .Values.mcp.service.wsPort }}
      targetPort: {{ .Values.mcp.service.wsPort }}
      protocol: TCP
      name: ws
  selector:
    {{- include "penpot.mcpSelectorLabels" . | nindent 4 }}
{{- end }}
