{{- if .Values.mcp.autoscaling.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "penpot.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "penpot.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "penpot.fullname" . }}-mcp
  minReplicas: {{ .Values.mcp.autoscaling.hpa.minReplicas }}
  maxReplicas: {{ .Values.mcp.autoscaling.hpa.maxReplicas }}
  metrics:
    {{- toYaml .Values.mcp.autoscaling.hpa.metrics | nindent 4 }}
{{- end }}
