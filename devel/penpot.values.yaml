---
config:
  publicUri: "http://penpot.example.com"
  apiSecretKey: "my-secret-key"
  flags: "enable-registration enable-login-with-password disable-email-verification enable-smtp disable-secure-session-cookies disable-onboarding enable-mcp"

  postgresql:
    host: "postgresql.penpot.svc.cluster.local"
    port: 5432
    database: "penpot"
    username: "penpot"
    password: "penpot"

  redis:
    host: "valkey.penpot.svc.cluster.local"
    port: 6379
    database: "0"

#backend:
#  replicaCount: 2

#frontend:
#  replicaCount: 2
#
#exporter:
#  replicaCount: 2
#  podSecurityContext:
#    enabled: false
#  containerSecurityContext:
#    enabled: false

persistence:
  assets:
    enabled: true
#  exporter:
#    enabled: true


## Tesr with ingress
# Enable this block for Ingress-based local access
#
#ingress:
#  enabled: true
#  hosts:
#    - "penpot.example.com"
#gateway:
#  enabled: false

## Tesr with gateway
# Enable this block for Gateway API-based local access
# When gateway.enabled=true, set ingress.enabled=false unless you explicitly want both.
ingress:
  enabled: false
gateway:
  enabled: true
  parentRefs:
    - name: penpot
      namespace: penpot
      sectionName: http
  hostnames:
    - "penpot.example.com"
  path: /
  pathMatchType: PathPrefix
