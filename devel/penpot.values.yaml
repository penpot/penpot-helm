---
## Default values for Penpot (local setup for development purpose)
global:
  postgresqlEnabled: true
  redisEnabled: true

config:
  publicUri: "http://penpot.example.com"
  apiSecretKey: "my-secret-key"
  flags: "enable-registration enable-login-with-password disable-email-verification enable-smtp disable-secure-session-cookies disable-onboarding enable-mcp"

  postgresql:
    host: "postgresql.penpot.svc.cluster.local"
    port: 5432
    database: "penpot"
    username: "penpot"
    password: "penpot"

  redis:
    host: "valkey.penpot.svc.cluster.local"
    port: 6379
    database: "0"

#backend:
#  replicaCount: 2

#frontend:
#  replicaCount: 2
#
#exporter:
#  replicaCount: 2
#  podSecurityContext:
#    enabled: false
#  containerSecurityContext:
#    enabled: false

persistence:
  assets:
    enabled: true
#  exporter:
#    enabled: true

ingress:
  enabled: true
  hosts:
    - "penpot.example.com"
